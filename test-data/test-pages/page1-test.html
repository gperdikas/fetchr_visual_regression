<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <title> page1-test </title>
  </head>
  <body>
    <style>
      #login-form,
      #create-user-form {
        border: 1px solid black;
        background-color: beige;
        width: 400px;
        border-radius: 10px;
        padding-top: 0px;
        overflow: hidden;
      }

      #login-title
      {
        Background-color: rgb(73, 109, 176);
        color: white;
        margin-top: 0px;
        padding-left: 10px;
      }

      #login-email-row,
      #login-password-row,
      #create-user-first-row,
      #create-user-last-row,
      #create-user-name-row,
      #create-user-email-address-row,
      #create-user-gender-row {
        display: flex;
        align-items: center;
        label {width: 100px;}
        padding: 10px;
      }
   
      #login-email-inputbox,
      #login-psw-inputbox,
      #create-user-first-inputbox,
      #create-user-last-inputbox,
      #create-user-name-inputbox
      {
        border: 1px  solid black;
        background-color: white;
        font-family: 'Times New Roman', Times, serif';  
      }

      #create-user-gender {
        border: 1px  solid black;
        background-color: white;
      }
    
      #login-btn-row,
      #create-user-btn-row {
        display: flex;
        justify-content: right;
        margin-top: 20px;
        margin-bottom: 20px;
        margin-right: 20px;
        gap: 10px;
      }

      #login-cancel-btn,
      #create-user-cancel-btn {
        border: 1px solid black;
        background-color: rgb(188, 134, 134);
      }

      #login-btn,
      #create-user-save-btn {
        border: 1px solid black;
        background-color: lightblue;
      }
    </style>

    <div id="login-form">
      
      <div> 
        <h2 id="login-title"> Login </h2> 
      </div>
     
      <div id="login-email-row"> 
        <label>Email address:</label> 
        <input id="login-email-inputbox"> 
      </div>
     
      <div id="login-password-row"> 
        <label>Password:</label> 
        <input id="login-psw-inputbox"> 
      </div>
    
      <div id="login-btn-row"> 
        <button id="login-cancel-btn"> Cancel </button> 
        <button id="login-btn"> Log in </button> 
      </div>
   
    </div>


    <div id="create-user-form">
      
      <div>
        <h2 id="create-user-title"> Create user </h2>
      </div>
      
      <div id="create-user-first-row"> 
        <label>First name</label>
        <input id="create-user-first-inputbox">
      </div>

      <div id="create-user-last-row"> 
        <label>Last name</label>
        <input id="create-user-last-inputbox">
      </div>
      
      <div id="create-user-name-row"> 
        <label>Last name</label>
        <input id="create-user-name-inputbox">
      </div>

      <div id="create-user-email-address-row"> 
        <label>Email address</label>
        <input id="create-user-email-address-inputbox">
      </div>

      <div id="create-user-gender-row">
        <label>Gender</label>
        <select id="create-user-gender">
          <option value="other">Other</option>
          <option value="male">Male</option>
          <option value="female">Fmale</option>
        </select>
      </div>

      <div id="create-user-btn-row"> 
        <button id="create-user-cancel-btn"> Cancel </button> 
        <button id="create-user-save-btn"> Save </button> 
      </div>

    </div>
  </body>
</html>
